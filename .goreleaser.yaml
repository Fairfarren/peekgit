# .goreleaser.yaml
# GoReleaser 配置文件 - 自动构建全平台二进制并发布到 Homebrew 和 Scoop

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: peekgit
    main: ./cmd/peekgit
    binary: peekgit
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: peekgit
    ids:
      - peekgit
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: peekgit
    repository:
      owner: Fairfarren
      name: peekgit
      branch: master
    directory: Formula
    homepage: https://github.com/Fairfarren/peekgit
    description: 终端里的多仓库监控面板。一次性查看 workspace 下所有 Git 仓库的分支状态、同步情况，以及 GitHub PR / Issues。
    license: MIT
    test: |
      system "#{bin}/peekgit --help"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(release): brew formula for {{ .Tag }}"
    skip_upload: true
    install: |-
      bin.install "peekgit"

# Scoop Bucket 配置 - 发布到当前仓库的 scoop/ 目录
scoops:
  - name: peekgit
    repository:
      owner: Fairfarren
      name: peekgit
      branch: master
    directory: scoop
    homepage: https://github.com/Fairfarren/peekgit
    description: 终端里的多仓库监控面板。一次性查看 workspace 下所有 Git 仓库的分支状态、同步情况，以及 GitHub PR / Issues。
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(release): scoop manifest for {{ .Tag }}"
    skip_upload: true
